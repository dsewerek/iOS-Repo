name: Auto-update AltStore Repo

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Fix 1: Prevents multiple runs from overlapping
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fix 2: Get full history for merging/rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests markdown beautifulsoup4

      - name: Run Scraper Script
        run: python githubScrape.py

      - name: Commit and Force-Sync Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add altstore-repo.json README.md scrapedIcons/
          
          # Don't fail if there's nothing to change
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to update."
            exit 0
          fi

          git commit -m "Auto-update AltStore repo"
          
          # Fix 3: The "Sync Loop"
          # We pull with rebase. If it fails, we try one more time.
          git pull --rebase origin main
          git push origin main || (git pull --rebase origin main && git push origin main)
