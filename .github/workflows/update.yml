name: Auto-update AltStore Repo
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests markdown beautifulsoup4

      - name: Run Scraper Script
        run: python githubScrape.py

      - name: Commit and Force-Sync Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add altstore-repo.json README.md scrapedIcons/
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to update."
            exit 0
          fi
          
          git commit -m "Auto-update AltStore repo"
          
          # Retry loop with exponential backoff
          for attempt in {1..3}; do
            git pull --rebase origin main && git push origin main && exit 0
            if [ $attempt -lt 3 ]; then
              sleep $((2 ** attempt))
            fi
          done
          
          echo "Failed to push after 3 attempts"
          exit 1
