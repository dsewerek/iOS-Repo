name: Auto-update AltStore Repo

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so rebase works correctly

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install requests markdown beautifulsoup4

      - name: Run Scraper Script
        run: python githubScrape.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Stage the changes
          git add altstore-repo.json README.md scrapedIcons/
          
          # Only commit if there are actual changes to prevent empty commit errors
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update AltStore repo"
            
            # THE FIX: Pull remote changes and rebase your new commit on top of them
            git pull --rebase origin main
            
            git push origin main
          
